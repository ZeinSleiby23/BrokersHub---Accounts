<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>BrokersHub - Login</title>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-4">
    <div class="max-w-md w-full bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
        
        <div class="bg-gradient-to-r from-blue-600 to-purple-700 p-8 text-center text-white">
            <h1 class="text-3xl font-bold">Welcome Back</h1>
            <p class="opacity-80 mt-2 text-sm">Please enter your details to login</p>
        </div>

        <div class="p-8">
            {% if error %}
            <div class="bg-red-50 text-red-600 p-3 rounded-lg text-sm mb-4 border border-red-100 text-center">
                {{ error }}
            </div>
            {% endif %}

            <form method="POST" class="space-y-6">
                {% csrf_token %}
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Username</label>
                    <input type="text" name="username" placeholder="Enter your username" required
                           class="w-full p-3 rounded-lg border border-gray-200 outline-none focus:ring-2 focus:ring-blue-500 transition">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Password</label>
                    <input type="password" name="password" placeholder="••••••••" required
                           class="w-full p-3 rounded-lg border border-gray-200 outline-none focus:ring-2 focus:ring-blue-500 transition">
                </div>

                <button type="submit" 
                        class="w-full bg-gradient-to-r from-blue-600 to-purple-700 text-white font-bold py-3 rounded-lg hover:opacity-90 transition transform hover:scale-[1.01] shadow-lg">
                    Log In
                </button>
            </form>
        </div>
    </div>
</body>
</html>
